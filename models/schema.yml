version: 2

models:
  - name: dim_provider_status
    description: "Master list of SABS providers with status tiers based on billing irregularity and claimant risk."
    columns:
      - name: provider_key
        description: "Unique MD5 hash of the provider name and MCC code."
        tests:
          - unique
          - not_null
      - name: provider_status
        description: "The operational status of the provider: ACTIVE, UNDER_REVIEW, or BLACKLISTED."